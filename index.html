      border:none;

      margin:4px 0;
      flex:1;
    }
    .exam-t{

      color:#8892b4;
    }

      gap:10px;

      border:none;

      text-align:center;

      text-align:center;
      font-weight:700;
      font-size:0.9rem;

    examples: [

      { en: "The book is on the table.", fa: "کتاب روی میزه. (سطح)" },
      { en: "Meet me at the station.", fa: "ایستگاه منو ببین. (نقطه دقیق)" },
      { en: "She is in the kitchen.", fa: "او توی آشپزخونه‌ست." },
      { en: "There's a picture on the wall.", fa: "یه عکس روی دیوار هست." }
    ]
  },
  {
    title: "۷. افعال کمکی (Modal Verbs)",
    desc: "افعال کمکی برای بیان توانایی (can)، اجازه (may/can)، الزام (must/have to)، نصیحت (should)، احتمال (might/may) استفاده می‌شن. بعد از این افعال، فعل به صورت ساده میاد و برای سوم شخص s نمی‌گیره. سوالی کردن با جابجایی فعل کمکی و فاعل انجام میشه.",
    examples: [
      { en: "I can swim very well.", fa: "من می‌تونم خیلی خوب شنا کنم. (توانایی)" },

      { en: "You should see a doctor.", fa: "تو باید یه دکتر ببینی. (نصیحت)" },
      { en: "May I come in?", fa: "اجازه هست بیام داخل؟ (اجازه)" },
      { en: "It might rain later.", fa: "ممکنه بعداً بارون بیاد. (احتمال)" }

  },
  {

    desc: "برای بیان شرایط واقعی و احتمالی در آینده استفاده می‌شه. فرمول: If + حال ساده، will + فعل ساده. قسمت شرط (if) می‌تونه اول یا دوم بیاد. اگه اول بیاد، بعدش کاما می‌ذاریم. این نوع شرطی برای چیزهاییه که احتمال وقوعشون در آینده وجود داره.",

    examples: [
      { en: "Do you like coffee?", fa: "آیا قهوه دوست داری؟ (سوال بله/خیر)" },
      { en: "Where does she live?", fa: "او کجا زندگی می‌کنه؟ (سوال با کلمه پرسشی)" },
      { en: "What did you eat yesterday?", fa: "دیروز چی خوردی؟" },
      { en: "Why are you crying?", fa: "چرا گریه می‌کنی؟" },
      { en: "How long have you been here?", fa: "چند وقته اینجایی؟" }

  },
  {

    examples: [
      { en: "This car is faster than that one.", fa: "این ماشین از اون یکی سریع‌تره." },
      { en: "She is the tallest girl in class.", fa: "او بلندترین دختر کلاسه." },
      { en: "Tehran is bigger than Isfahan.", fa: "تهران از اصفهان بزرگتره." },
      { en: "This is the most interesting book I've read.", fa: "این جالب‌ترین کتابیه که خوندم." },
      { en: "His English is better than mine.", fa: "انگلیسیش از من بهتره." }

];

const terms = Object.keys(data);
let currentTerm = 0;
let currentIndex = 0;
let mode = 'learn';
let isMeaningVisible = false;
let quizAnswered = false;
let quizCurrentWord = null;
let correctCount = 0;
let wrongCount = 0;

function buildHTML() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <h1>🗣️ همیار زبان</h1>
    <div class="mode-bar">
      <button id="learnTab" class="active">📘 یادگیری</button>
      <button id="quizTab">🎯 کوییز</button>
      <button id="grammarTab">📖 گرامر</button>
    </div>
    <div class="term-nav">
      <button id="prevTerm">◀</button>
      <span id="termNum">${terms[currentTerm] || ''}</span>
      <button id="nextTerm">▶</button>
    </div>
    <div id="learnPanel">
      <div class="card">
        <div class="word-row">
          <span class="word" id="word"></span>
          <button class="speak-btn" id="speakBtn">🔊</button>
        </div>
        <div id="meaningBox" class="hidden">
          <div class="mean" id="mean"></div>
          <div class="exam-row">
            <div class="exam" id="exam"></div>
            <button class="speak-btn-sm" id="speakExamBtn">🔊</button>
          </div>
          <div class="exam-t" id="examT"></div>
        </div>
      </div>
      <div class="btns-row" style="margin-top:8px;">
        <button class="btn btn-reveal" id="toggleBtn">🔍 نمایش معنی</button>
        <button class="btn" id="nextBtn">⏩ بعدی</button>
      </div>
      <div class="counter" id="counter" style="margin-top:8px;"></div>
    </div>
    <div id="quizPanel" style="display:none;">
      <div class="card">
        <div class="word-row">
          <span class="word" id="qw"></span>
          <button class="speak-btn" id="qspeak">🔊</button>
        </div>
        <div class="quiz-options" id="qopt"></div>
      </div>
      <div class="score-bar">
        <span>✅ <span id="cs">0</span></span>
        <span>❌ <span id="ws">0</span></span>
      </div>
      <button class="btn" id="nq" style="margin-top:8px;">سوال بعدی ⏩</button>
    </div>
    <div id="grammarPanel" style="display:none;">
      <div class="grammar-section" id="grammarContent"></div>
    </div>
  `;
  bindEvents();
  if(terms.length > 0) loadWord();
}

function bindEvents() {
  document.getElementById('learnTab').onclick = ()=> switchMode('learn');
  document.getElementById('quizTab').onclick = ()=> switchMode('quiz');
  document.getElementById('grammarTab').onclick = ()=> switchMode('grammar');
  document.getElementById('prevTerm').onclick = ()=>{
    if(currentTerm>0){currentTerm--;currentIndex=0;if(mode==='learn')loadWord();else if(mode==='quiz')generateQuiz();updateTermDisplay();}
  };
  document.getElementById('nextTerm').onclick = ()=>{
    if(currentTerm<terms.length-1){currentTerm++;currentIndex=0;if(mode==='learn')loadWord();else if(mode==='quiz')generateQuiz();updateTermDisplay();}
  };
  document.getElementById('toggleBtn').onclick = toggleMeaning;
  document.getElementById('nextBtn').onclick = nextWord;
  document.getElementById('speakBtn').onclick = ()=> {
    const list=getCurrentList();
    if(list.length) speakWord(list[currentIndex].w, 'en-US');
  };
  document.getElementById('speakExamBtn').onclick = ()=> {
    const list=getCurrentList();
    if(list.length) speakWord(list[currentIndex].e, 'en-US');
  };
  document.getElementById('qspeak').onclick = ()=> {
    if(quizCurrentWord) speakWord(quizCurrentWord.w, 'en-US');
  };
  document.getElementById('nq').onclick = generateQuiz;
}

function updateTermDisplay() {
  document.getElementById('termNum').textContent = terms[currentTerm] || '';
}

function getCurrentList() {
  return data[terms[currentTerm]] || [];
}

function loadWord() {
  const list = getCurrentList();
  if(!list.length) return;
  if(currentIndex >= list.length) currentIndex = 0;
  const item = list[currentIndex];
  document.getElementById('word').textContent = item.w;
  document.getElementById('mean').textContent = item.t;
  document.getElementById('exam').textContent = item.e;
  document.getElementById('examT').textContent = item.et || '';
  isMeaningVisible = false;
  document.getElementById('meaningBox').classList.add('hidden');
  document.getElementById('toggleBtn').textContent = '🔍 نمایش معنی';
  document.getElementById('counter').textContent = `${currentIndex+1} از ${list.length}`;
  updateTermDisplay();
}

function toggleMeaning() {
  const box = document.getElementById('meaningBox');
  const btn = document.getElementById('toggleBtn');
  if(isMeaningVisible) {
    box.classList.add('hidden');
    btn.textContent = '🔍 نمایش معنی';
    isMeaningVisible = false;
  } else {
    box.classList.remove('hidden');
    btn.textContent = '🙈 پنهان کردن';
    isMeaningVisible = true;
  }
}

function nextWord() {
  const list = getCurrentList();
  if(!list.length) return;
  currentIndex = (currentIndex + 1) % list.length;
  loadWord();
}

function speakWord(word, lang) {
  if(window.speechSynthesis) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang = lang || 'en-US';
    u.rate = 0.7;
    window.speechSynthesis.speak(u);
  }
}

function shuffle(a) {
  for(let i=a.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function generateQuiz() {
  const list = getCurrentList();
  if(!list.length) return;
  quizAnswered = false;
  const ri = Math.floor(Math.random()*list.length);
  quizCurrentWord = list[ri];
  document.getElementById('qw').textContent = quizCurrentWord.w;
  let others = list.filter((_,i)=>i!==ri);
  others = shuffle([...others]).slice(0,3);
  let opts = [quizCurrentWord.t, ...others.map(x=>x.t)];
  opts = shuffle(opts);
  const container = document.getElementById('qopt');
  container.innerHTML = '';
  opts.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'quiz-opt';
    b.textContent = opt;
    b.onclick = ()=> handleQuiz(opt, b);
    container.appendChild(b);
  });
}

function handleQuiz(selected, btn) {
  if(quizAnswered || !quizCurrentWord) return;
  quizAnswered = true;
  const isCorrect = selected === quizCurrentWord.t;
  document.querySelectorAll('.quiz-opt').forEach(b=>{
    b.style.pointerEvents='none';
    if(b.textContent === quizCurrentWord.t) b.classList.add('correct');
  });
  if(isCorrect) {
    correctCount++;
    btn.classList.add('correct');
  } else {
    wrongCount++;
    btn.classList.add('wrong');
  }
  document.getElementById('cs').textContent = correctCount;
  document.getElementById('ws').textContent = wrongCount;
}

function renderGrammar() {
  const container = document.getElementById('grammarContent');
  let html = '<div class="grammar-title">📖 گرامر انگلیسی</div>';
  grammarData.forEach((lesson, index) => {
    html += `<div class="grammar-lesson">
      <h4>${lesson.title}</h4>
      <p class="desc">${lesson.desc}</p>`;
    lesson.examples.forEach(ex => {
      html += `<div class="grammar-example">${ex.en}</div>
      <div class="grammar-trans">${ex.fa}</div>`;
    });
    html += `<button class="btn explain-btn" onclick="explainGrammar(${index})">🔊 توضیح فارسی</button>`;
    html += '</div>';
  });
  container.innerHTML = html;
}

function explainGrammar(index) {
  const lesson = grammarData[index];
  const text = `${lesson.title}. ${lesson.desc}`;
  if(window.speechSynthesis) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'fa-IR';
    u.rate = 0.8;
    window.speechSynthesis.speak(u);
  }
}

function switchMode(m) {
  mode = m;
  document.getElementById('learnPanel').style.display='none';
  document.getElementById('quizPanel').style.display='none';
  document.getElementById('grammarPanel').style.display='none';
  document.getElementById('learnTab').classList.remove('active');
  document.getElementById('quizTab').classList.remove('active');
  document.getElementById('grammarTab').classList.remove('active');

  if(m==='learn') {
    document.getElementById('learnPanel').style.display='block';
    document.getElementById('learnTab').classList.add('active');
    if(terms.length > 0) loadWord();
  } else if(m==='quiz') {
    document.getElementById('quizPanel').style.display='block';
    document.getElementById('quizTab').classList.add('active');
    correctCount=0; wrongCount=0;
    document.getElementById('cs').textContent='0';
    document.getElementById('ws').textContent='0';
    if(terms.length > 0) generateQuiz();
  } else if(m==='grammar') {
    document.getElementById('grammarPanel').style.display='block';
    document.getElementById('grammarTab').classList.add('active');
    renderGrammar();
  }
}

buildHTML();
</script>
</body>
</html>
